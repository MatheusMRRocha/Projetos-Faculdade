<!DOCTYPE html>
	<html>
		<head>
			<meta charset="UTF-8">
			<title>Calculadora</title>
			<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
			<link rel="stylesheet" href="Style.css">
		</head>
		<body>
			<div class="app">
				<h4>Calculadora</h4>
				<input type="number" id="valor1">
				<class="form-control mb-2" placeholder="Primeiro valor">
				<input type="number" id="valor2">
				<class="form-control mb-3" placeholder="Segundo valor">
				
				<div class="d-flex justify-content-between">
					<button class="btn btn-primary" onclick="calcular('+')">+</button>
					<button class="btn btn-primary" onclick="calcular('-')">-</button>
					<button class="btn btn-primary" onclick="calcular('*')">*</button>
					<button class="btn btn-primary" onclick="calcular('/')">/</button>
				</div>

				<h4>Calculadora Media</h4>
				<input type="number" id="valor1">
				<class="form-control mb-2" placeholder="Primeiro valor">
				<input type="number" id="valor2">
				<class="form-control mb-3" placeholder="Segundo valor">
				
				<div class="d-flex justify-content-between">
					<button class="btn btn-primary" onclick="calcular('media')">=</button>
				</div>
				
				<h4>Calculadora Lucro</h4>
				<input type="number" id="valor1">
				<class="form-control mb-2" placeholder="Primeiro valor">
				<input type="number" id="valor2">
				<class="form-control mb-3" placeholder="Segundo valor">
				
				<div class="d-flex justify-content-between">
					<button class="btn btn-primary" onclick="calcular('lucro')">=</button>
				</div>
				
				<h4>Calculadora Valor Total de Compra Total</h4>
				<input type="number" id="valor1">
				<class="form-control mb-2" placeholder="Primeiro valor">
				<input type="number" id="valor2">
				<class="form-control mb-3" placeholder="Segundo valor">
				
				<div class="d-flex justify-content-between">
					<button class="btn btn-primary" onclick="calcular('total')">=</button>
				</div>
				<h5 class="mt-3" id="resultado"></h5>
			</div>		
			<script src="script.js"></script>
		</body>
	</html>
